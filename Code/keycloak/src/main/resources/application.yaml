server:
  port: ${SERVER_PORT:8000}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: keycloak
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/keycloak}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/baseline-master.xml
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_SERVER_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:kc-be}

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:kc-be}
  client-id: ${KEYCLOAK_CLIENT_ID:spring-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:Xg2EuQAFj6FGP1DQg8J4lY0nYLxznXf4}
